<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
  <clipPath id="ic">
    <rect x="0" y="0" width="512" height="512" rx="112"/>
  </clipPath>
</defs>

<!-- App icon background -->
<rect x="0" y="0" width="512" height="512" rx="112" fill="#07090d"/>
<rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#00e5b0" stroke-width="2" opacity="0.1"/>

<!-- Inner grid (subtle) -->
<g clip-path="url(#ic)" opacity="0.04" stroke="#00e5b0" stroke-width="1">
  <line x1="0" y1="170" x2="512" y2="170"/>
  <line x1="0" y1="256" x2="512" y2="256"/>
  <line x1="0" y1="342" x2="512" y2="342"/>
</g>

<!-- AR corner brackets -->
<g fill="none" stroke="#00e5b0" stroke-width="3" stroke-linecap="round" opacity="0.45">
  <path d="M72,100 L72,68 L104,68"/>
  <path d="M440,68 L472,68 L472,100"/>
  <path d="M72,412 L72,444 L104,444"/>
  <path d="M440,444 L472,444 L472,412"/>
</g>

<!-- HAND (clipped) -->
<g clip-path="url(#ic)">

  <!-- Index finger -->
  <rect x="188" y="120" width="52" height="220" rx="26"
        fill="rgba(0,229,176,0.08)" stroke="#00e5b0" stroke-width="4"/>

  <!-- Middle finger (taller) -->
  <rect x="258" y="96" width="52" height="244" rx="26"
        fill="rgba(0,229,176,0.08)" stroke="#00e5b0" stroke-width="4"/>

  <!-- Palm base -->
  <rect x="158" y="318" width="224" height="128" rx="44"
        fill="rgba(0,229,176,0.08)" stroke="#00e5b0" stroke-width="4"/>

  <!-- Ring knuckle -->
  <rect x="316" y="294" width="42" height="56" rx="21"
        fill="rgba(0,229,176,0.08)" stroke="#00e5b0" stroke-width="3"/>

  <!-- Pinky knuckle -->
  <rect x="360" y="310" width="32" height="44" rx="16"
        fill="rgba(0,229,176,0.08)" stroke="#00e5b0" stroke-width="3"/>

  <!-- Thumb arc -->
  <path d="M 158,356 C 106,336 86,300 98,264 C 106,240 136,228 158,252"
        fill="none" stroke="#00e5b0" stroke-width="4" stroke-linecap="round"/>

  <!-- AR cursor rings at index fingertip -->
  <circle cx="214" cy="106" r="46" fill="none" stroke="#00e5b0" stroke-width="2" opacity="0.2"/>
  <circle cx="214" cy="106" r="30" fill="none" stroke="#00e5b0" stroke-width="3" opacity="0.45"/>
  <circle cx="214" cy="106" r="13" fill="#00e5b0"/>

  <!-- Movement trail -->
  <circle cx="256" cy="82" r="9" fill="#00e5b0" opacity="0.48"/>
  <circle cx="295" cy="62" r="7" fill="#00e5b0" opacity="0.28"/>
  <circle cx="332" cy="45" r="5" fill="#00e5b0" opacity="0.15"/>
  <circle cx="366" cy="32" r="4" fill="#a855f7" opacity="0.3"/>

</g>
</svg>
